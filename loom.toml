[loom]
git_hook_timeout_secs = 900
sccache_dir = ".loom/sccache"

[phase.default]
profile = "rust"
agent.backend = "pi"

[runner.test]
command = "bash tests/loom-nextest-file-targets.sh '{paths}'"

[runner.check.verify]
match = '^verify:(.+)$'
command = "nix run .#verify -- {targets}"
target = "{capture_1}"
join = " "
parse = "json-lines"
cwd = "."

[runner.check.test-ci]
match = '^test-ci:(.+)$'
command = "bin/test-ci-verifiers {targets}"
target = "{capture_1}"
join = " "
parse = "json-lines"
cwd = "."

[runner.system.verify]
match = '^verify:(.+)$'
command = "nix run .#verify -- {targets}"
target = "{capture_1}"
join = " "
parse = "json-lines"
cwd = "."

[runner.system.test-ci]
match = '^test-ci:(.+)$'
command = "bin/test-ci-verifiers {targets}"
target = "{capture_1}"
join = " "
parse = "json-lines"
cwd = "."
