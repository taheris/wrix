repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: ^\.beads/config\.yaml$
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: local
    hooks:
      # Fast pre-commit tests (~1s)
      - id: treefmt
        name: treefmt
        entry: treefmt --fail-on-change
        language: system
        pass_filenames: true
        stages: [pre-commit]

      - id: ralph-check-templates
        name: ralph check templates
        entry: ralph check -t
        language: system
        files: ^lib/ralph/template/
        pass_filenames: false
        stages: [pre-commit]

      # Pre-push hooks (~10s)
      #
      # Force sandbox=true so the gate matches the upstream CI / fresh-nix
      # behaviour on developer machines that have sandbox disabled in
      # /etc/nix/nix.conf (e.g. nested containers without user-namespace
      # support). Without this, fixture scripts that depend on
      # `/usr/bin/env` silently pass locally and fail in CI.
      - id: nix-flake-check
        name: nix flake check
        entry: nix flake check --option sandbox true
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Integration tests (~1m, conditional on changes to relevant files)
      - id: city-integration
        name: city integration tests
        entry: nix run .#test-city
        language: system
        pass_filenames: false
        files: ^(lib/city/(scripts|formulas|orders|prompts)/|tests/city/)
        stages: [pre-push]

      - id: ralph-integration
        name: ralph integration tests
        entry: nix run .#test-ralph
        language: system
        pass_filenames: false
        files: ^(lib/ralph/(cmd|template)/|tests/ralph/)
        stages: [pre-push]
