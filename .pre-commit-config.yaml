repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: ^\.beads/config\.yaml$
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: local
    hooks:
      # Fast pre-commit tests (~1s)
      - id: treefmt
        name: treefmt
        entry: treefmt --fail-on-change
        language: system
        pass_filenames: true
        stages: [pre-commit]

      - id: ralph-check-templates
        name: ralph check templates
        entry: ralph check -t
        language: system
        files: ^lib/ralph/template/
        pass_filenames: false
        stages: [pre-commit]

      - id: shell-reexec-explicit-interpreter
        name: shell re-exec must invoke interpreter explicitly
        entry: scripts/check-shell-reexec
        language: system
        types: [shell]
        pass_filenames: true
        stages: [pre-commit]

      # loom check --check=criteria --no-run — structural spec ↔ test
      # dispatcher audit. Fast (~ms): stubs, missing dispatchers,
      # orphans, masquerade — without invoking the live verifiers. The
      # default (live) audit runs every `[verify]` script per FR14 and
      # is far too slow for a pre-commit hook. Files filter triggers on
      # changes to any spec or to the dispatcher, which is the surface
      # the audit cross-references. `always_run: false` so unrelated
      # commits skip the check.
      - id: loom-check-criteria
        name: loom check --check=criteria --no-run
        entry: nix run .#loom -- check --check=criteria --no-run
        language: system
        pass_filenames: false
        files: ^(specs/|tests/loom-test\.sh$|loom/crates/[^/]+/)
        stages: [pre-commit]

      # loom check --check=matrix — pinning-matrix drift audit. Reads the
      # `### Pinning Policy` table in specs/loom-templates.md and the
      # `{% include %}` graph under loom-templates/templates/ (transitively
      # resolved); fails on any cell that diverges in either direction.
      # Fast (~ms): pure file parse, no cargo / nix invocations beyond
      # spawning the binary. Files filter triggers on changes to the
      # templates spec or to any template body.
      - id: loom-check-matrix
        name: loom check --check=matrix
        entry: nix run .#loom -- check --check=matrix
        language: system
        pass_filenames: false
        files: ^(specs/loom-templates\.md$|loom/crates/loom-templates/templates/)
        stages: [pre-commit]

      # Pre-push hooks (~10s)
      - id: nix-flake-check
        name: nix flake check
        entry: nix flake check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Integration tests (~1m, conditional on changes to relevant files)
      - id: city-integration
        name: city integration tests
        entry: bash -c 'nix run .#test-city; rc=$?; [ "$rc" = "77" ] && exit 0; exit "$rc"'
        language: system
        pass_filenames: false
        files: ^(lib/city/(scripts|formulas|orders|prompts)/|tests/city/)
        stages: [pre-push]

      - id: loom-integration
        name: loom integration tests
        entry: nix run .#test-loom
        language: system
        pass_filenames: false
        files: ^loom/crates/[^/]+/tests/properties\.rs$
        stages: [pre-push]

      - id: ralph-integration
        name: ralph integration tests
        entry: nix run .#test-ralph
        language: system
        pass_filenames: false
        files: ^(lib/ralph/(cmd|template)/|tests/ralph/)
        stages: [pre-push]
