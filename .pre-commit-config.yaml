repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: ^\.beads/config\.yaml$
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: local
    hooks:
      # Fast pre-commit tests (~1s)
      - id: treefmt
        name: treefmt
        entry: treefmt --fail-on-change
        language: system
        pass_filenames: true
        stages: [pre-commit]

      - id: ralph-check-templates
        name: ralph check templates
        entry: ralph check -t
        language: system
        files: ^lib/ralph/template/
        pass_filenames: false
        stages: [pre-commit]

      - id: shell-reexec-explicit-interpreter
        name: shell re-exec must invoke interpreter explicitly
        entry: scripts/check-shell-reexec
        language: system
        types: [shell]
        pass_filenames: true
        stages: [pre-commit]

      # loom doctor — spec ↔ test stub-and-integration audit. Fast (~ms).
      # Files filter triggers on changes to any spec or to the dispatcher,
      # which is the surface the audit cross-references. `always_run: false`
      # so unrelated commits skip the check.
      - id: loom-doctor
        name: loom doctor --check=criteria
        entry: nix run .#loom -- doctor --check=criteria
        language: system
        pass_filenames: false
        files: ^(specs/|tests/loom-test\.sh$|loom/crates/[^/]+/)
        stages: [pre-commit]

      # Pre-push hooks (~10s)
      - id: nix-flake-check
        name: nix flake check
        entry: nix flake check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Integration tests (~1m, conditional on changes to relevant files)
      - id: city-integration
        name: city integration tests
        entry: nix run .#test-city
        language: system
        pass_filenames: false
        files: ^(lib/city/(scripts|formulas|orders|prompts)/|tests/city/)
        stages: [pre-push]

      - id: loom-integration
        name: loom integration tests
        entry: nix run .#test-loom
        language: system
        pass_filenames: false
        files: ^loom/crates/[^/]+/tests/properties\.rs$
        stages: [pre-push]

      - id: ralph-integration
        name: ralph integration tests
        entry: nix run .#test-ralph
        language: system
        pass_filenames: false
        files: ^(lib/ralph/(cmd|template)/|tests/ralph/)
        stages: [pre-push]
