repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: ^\.beads/config\.yaml$
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: local
    hooks:
      # Fast pre-commit tests (~1s)
      - id: treefmt
        name: treefmt
        entry: treefmt --fail-on-change
        language: system
        pass_filenames: true
        stages: [pre-commit]

      - id: shell-reexec-explicit-interpreter
        name: shell re-exec must invoke interpreter explicitly
        entry: scripts/check-shell-reexec
        language: system
        types: [shell]
        pass_filenames: true
        stages: [pre-commit]

      # Pre-push hooks (~10s)
      - id: nix-flake-check
        name: nix flake check
        entry: pre-push-checks nix flake check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # loom gate verify enforces every spec annotation (and the
      # spec-convention integrity rules — e.g. resolved `?` markers).
      # --diff @{upstream}..HEAD scopes to the commits the push will
      # publish; loom's no-flag default is `HEAD` (last commit only)
      # outside a molecule context, which would miss earlier commits in
      # the push range. skip-if-missing keeps the hook inert in contexts
      # where loom isn't on PATH (bead containers without the rust-mcp
      # profile, fresh clones outside the devshell). pre-push-checks skips
      # the slow verifier when loom has already minted a valid marker.
      - id: loom-gate-verify
        name: loom gate verify
        entry: skip-if-missing loom -- pre-push-checks loom gate verify --diff @{upstream}..HEAD
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
