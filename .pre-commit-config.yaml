repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: ^\.beads/config\.yaml$
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: local
    hooks:
      # Fast pre-commit checks
      - id: treefmt
        name: treefmt
        entry: treefmt --fail-on-change
        language: system
        pass_filenames: true
        stages: [pre-commit]

      - id: shell-reexec-explicit-interpreter
        name: shell re-exec must invoke interpreter explicitly
        entry: scripts/check-shell-reexec
        language: system
        types: [shell]
        pass_filenames: true
        stages: [pre-commit]

      # Slow tests use loom markers
      - id: nix-flake-check
        name: nix flake check
        entry: >-
          bin/pre-push-checks --hook-id nix-flake-check --
          nix flake check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: loom-gate-verify
        name: loom gate verify
        entry: >-
          bin/pre-push-checks --hook-id loom-gate-verify --
          skip-if-missing loom --
          env WRIX_PRE_PUSH=1 loom gate verify --diff @{upstream}..HEAD
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
