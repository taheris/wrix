# Loom-the-repo's own LoomConfig — see specs/loom-harness.md § Configuration.

# Gate runners — per-tier batched dispatch with per-runner cwd. Schema
# owned by specs/loom-gate.md § Runners.
#
# The `command` placeholder uses the in-tree `{paths}` syntax wired
# through the current `loom_gate::runner::RunnerTemplate::render` slot
# replicator. The companion `target`/`join`/`parse` fields capture the
# new schema's per-runner metadata; per-language runner dispatch will
# move the command to `{filter}` once the new parsers land.

[runner.test]
command = "cargo nextest run --manifest-path loom/Cargo.toml -E 'test({paths})'"
target  = "test({name})"
join    = " | "
parse   = "libtest-json"
cwd     = "."

[runner.check]
# Per-tier default cwd for [check] annotations whose specific runner
# does not override. Loom-the-repo's Rust workspace lives at `loom/`.
cwd = "loom"

[runner.system.nix]
match   = '^nix (build|run) \.#(\S+)$'
command = "nix build {targets}"
target  = ".#{capture_2}"
join    = " "
parse   = "nix-build-status"
cwd     = "."
