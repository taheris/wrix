description = """
Judge patrol loop — reviews worker output, enforces style guidelines, and owns merge.

Persistent session that receives nudges from the gate condition script when
a worker completes. Reviews the diff against docs/style-guidelines.md,
sets review_verdict on the bead metadata (approve/reject), and flags
non-documented-rule issues for director review via bd human.

After approving a worker's changes, the judge merges immediately — review
and merge as one continuous flow. This naturally serializes merges since
the judge processes its queue one at a time.

Also periodically sweeps .wrapix/orchestration.md for stale dynamic context
(expired dated entries, undated entries older than 7 days).

## Context

Pins docs/README.md and docs/style-guidelines.md always. Loads
.wrapix/orchestration.md on demand for dynamic context.

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| stale_days | city config | Days before undated entries are stale (default: 7) |
"""
formula = "wrapix-judge"
version = 1

[vars]
[vars.stale_days]
description = "Days before undated .wrapix/orchestration.md entries are considered stale"
default = "7"

[[steps]]
id = "load-context"
title = "Load review context and guidelines"
description = """
**1. Prime environment:**
```bash
gc prime
bd prime
```

**2. Read pinned context:**

Read `docs/README.md` for project overview.
Read `docs/style-guidelines.md` — these are the rules you enforce.
Internalize every rule. You will apply them mechanically.

**3. Check inbox for review requests:**
```bash
gc mail inbox
```

The gate condition script nudges the judge with commit range and bead
ID when a worker completes. Read the nudge to get:
- Bead ID to review
- Commit range to diff

If no review pending, proceed to sweep step.

**Exit criteria:** Style guidelines loaded, review assignment known (or none)."""

[[steps]]
id = "finalize"
title = "Review diff, then finalize the outcome via judge-merge.sh"
needs = ["load-context"]
description = """
If no review assignment from load-context, skip to sweep step.

**1. Read the bead and diff the commits:**
```bash
bd show $BEAD_ID
git diff $COMMIT_RANGE
git log --oneline $COMMIT_RANGE
```
The bead ID is available via the `$GC_BEAD_ID` environment variable
(injected by the formula env, not runtime.Config).

**2. Review mechanically against docs/style-guidelines.md:**

For each rule in the style guide, check if the diff violates it.
Be precise — only flag violations of DOCUMENTED rules.

**3. Flag non-documented concerns for the director (optional):**

Do NOT reject based on undocumented opinions. If you see a concern that
isn't a documented rule, flag it for human review without changing the
verdict:
```bash
bd label add $BEAD_ID human && bd note $BEAD_ID "Non-documented concern: $DESCRIPTION"
```

**4. Finalize via judge-merge.sh (sole writer of review_verdict):**

Call the script in one of two modes — always, whether approving or
rejecting. Do NOT set review_verdict directly with bd; the script owns
that metadata and guarantees cleanup on all paths.

**If all documented rules pass → approve (script merges and cleans up):**
```bash
GC_BEAD_ID=$BEAD_ID GC_WORKSPACE=$GC_WORKSPACE bash .gc/scripts/judge-merge.sh approve
```

**If documented rule violations found → reject (script records + cleans up):**
```bash
GC_BEAD_ID=$BEAD_ID GC_WORKSPACE=$GC_WORKSPACE bash .gc/scripts/judge-merge.sh reject \\
  "SH-1 violated at line 15: missing set -euo pipefail; SH-2 violated at line 23: unquoted \$foo"
```
Include specific rule IDs (e.g. SH-1, NX-2, GIT-1) and line numbers from
docs/style-guidelines.md so the next worker iteration can address them
precisely.

The script handles, in a single flow:
- Recording review_verdict=approve|reject on the bead
- (approve only) Fast-forward merge, or rebase+ff if main advanced
- (approve only) Conflict/prek failure → converts verdict to reject
- Worktree and branch cleanup (EXIT trap — always runs)

Exit code 0 = merged on approve, or reject recorded.
Exit code 1 = approve attempted but merge failed (verdict now reject).

**Exit criteria:** Verdict written, merge attempted if approved, worktree
and branch cleaned up."""

[[steps]]
id = "sweep-stale"
title = "Sweep .wrapix/orchestration.md for stale context"
needs = ["finalize"]
description = """
Check .wrapix/orchestration.md for stale dynamic context.

**1. Read the file if it exists:**
```bash
cat .wrapix/orchestration.md 2>/dev/null || echo "(no dynamic context)"
```

**2. Identify stale entries:**

- **Dated entries with expired dates:** Any entry with an explicit date
  that has passed should be flagged for removal
- **Undated entries older than {{stale_days}} days:** Check git blame or
  modification timestamps. Entries without dates that are older than
  {{stale_days}} days are considered stale

**3. Clean up stale entries:**

Remove stale entries from the file. Commit the cleanup:
```bash
git add .wrapix/orchestration.md
git commit -m "chore: sweep stale context from .wrapix/orchestration.md"
```

If no stale entries found, skip.

**Exit criteria:** Dynamic context is current, stale entries removed."""

[[steps]]
id = "next-iteration"
title = "Wait for next review or pour next iteration"
needs = ["sweep-stale"]
description = """
End of review cycle. Wait for the next nudge or pour a new iteration.

**1. Context check:**
If context feels heavy or RSS is high:
```bash
gc runtime request-restart
```

**2. Pour next iteration:**
```bash
NEXT=$(bd mol wisp wrapix-judge --root-only --json | jq -r '.new_epic_id')
bd update "$NEXT" --assignee=$GC_AGENT
```

**3. Burn this wisp:**
```bash
bd mol burn <this-wisp-id> --force
```

The gate condition script will nudge the judge when the next worker
completes. Between reviews, gc's session_sleep auto-suspends the session.

**Exit criteria:** Next wisp poured, this wisp burned."""
